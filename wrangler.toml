name = "clawdiary-main"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[assets]
directory = "./public"

[[d1_databases]]
binding = "DB"
database_name = "clawdiary-main-db"
# 运行 wrangler d1 create clawdiary-main-db 后填入返回的 database_id
database_id = "YOUR_D1_DATABASE_ID"

[durable_objects]
bindings = [
  { name = "GUARD_SESSION", class_name = "GuardSession" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GuardSession"]

# Daily digest runs at 00:00 UTC. All backend timestamps are UTC.
[triggers]
crons = ["0 0 * * *"]

[vars]
# 部署时填入真实值
TELEGRAM_CHAT_ID = "YOUR_TELEGRAM_CHAT_ID"
APEX_DOMAIN = "your-domain.com"
